id: for_each_subflow
namespace: qa
tasks:

  - id: run_extract
    type: io.kestra.plugin.core.flow.ForEach
    values: '["Paris", "Berlin"]'
    tasks:

      - id: subflow
        type: io.kestra.plugin.core.flow.Subflow
        namespace: qa
        flowId: log
        inputs:
          time: '{{ trigger.date ?? now() | date("yyyy-MM-dd") }}'
          city: "{{ taskrun.value }}"