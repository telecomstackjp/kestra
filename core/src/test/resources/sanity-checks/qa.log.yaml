id: log
namespace: qa

inputs:
  - id: time
    type: DATE
    after: 2024-01-01
    required: true
    
  - id: city
    type: SELECT
    values:
      - Berlin
      - Paris
      - "New York"
    required: true

tasks:
  - id: logs1
    type: io.kestra.plugin.core.log.Log
    message: "{{ inputs.time }} - {{ inputs.city }}"
    level: WARN

  - id: logs2
    type: io.kestra.plugin.core.log.Log
    message: "{{ inputs.time }} - {{ inputs.city }}"
    level: INFO

       