id: if
namespace: qa

tasks:
  - id: if_true
    type: io.kestra.plugin.core.flow.If
    condition: "{{ true }}"
    then:
      - id: true_log
        type: io.kestra.plugin.core.log.Log
        message: This was true

  - id: if_false
    type: io.kestra.plugin.core.flow.If
    condition: "{{ false }}"
    then:
      - id: does_not_run
        type: io.kestra.plugin.core.log.Log
        message: This won't run
    else:
      - id: false_log
        type: io.kestra.plugin.core.log.Log
        message: This was false

  - id: run_if_true
    type: io.kestra.plugin.core.log.Log
    runIf: "{{ true }}"
    message: This was true

  - id: run_if_false
    type: io.kestra.plugin.core.log.Log
    runIf: "{{ false }}"
    message: This was false and won't run